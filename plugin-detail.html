<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

<nav>
  <h2>Minecraft Developer</h2>

<section class="content">
  <div id="pluginDetail"></div>

  <div class="auth-box">
    <h2>Bewertung schreiben</h2>

    <select id="reviewStars">
      <option value="5">5 Sterne</option>
      <option value="4">4 Sterne</option>
      <option value="3">3 Sterne</option>
      <option value="2">2 Sterne</option>
      <option value="1">1 Stern</option>

    <textarea id="reviewComment" placeholder="Dein Kommentar"></textarea>

    <button onclick="submitReview()">Bewertung absenden</button>
    <p>Bewertungen werden erst nach Admin-Freigabe sichtbar.</p>
  </div>

  <h2>Bewertungen</h2>
  <div id="reviewList" class="cards"></div>
